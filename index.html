<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Insta Reports Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --insta-blue: #3858f0; --grey-text: #737373; }
        body, html { margin: 0; padding: 0; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; height: 100%; width: 100%; overflow: hidden; }
        
        /* 🔒 CEO Access Hub */
        #login-box { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 2000; position: fixed; top:0; left:0; }
        .login-input { padding: 15px; background: #111; border: 2px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; text-align: center; width: 75%; max-width: 300px; outline: none; }
        .login-btn { padding: 12px 40px; background: var(--accent); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #main-ui { display: none; width: 100%; flex-direction: column; background: #fff; min-height: 100vh; }
        #capture-area { background: #fff; width: 100%; display: inline-block; padding-bottom: 20px; position: relative; }
        .editable { outline: none; border-bottom: 1px dashed transparent; }
        .editable:focus { border-bottom: 1px dashed #ccc; }

        /* 🔋 Status Bar matched with 54609.png */
        .status-bar { display: flex; justify-content: space-between; padding: 10px 18px 5px 18px; background: #fff; color: #000; font-size: 14px; font-weight: 700; align-items: center; }
        .sb-left { display: flex; align-items: center; gap: 8px; font-size: 16px; }
        .sb-right { display: flex; align-items: center; gap: 4px; }
        .bat-pill { background: #e5e5ea; border-radius: 12px; padding: 2px 5px; display: flex; align-items: center; gap: 2px; position: relative; min-width: 40px; height: 18px; overflow: hidden; }
        .bat-fill { position: absolute; left: 0; top: 0; height: 100%; background: #34c759; transition: width 0.3s ease; z-index: 1; }
        .bat-text { position: relative; z-index: 2; color: #fff; font-size: 11px; font-weight: 800; }

        /* 🛠️ Top Navigation */
        .top-nav { display: flex; align-items: center; padding: 15px 18px; gap: 30px; border-bottom: 1px solid #efefef; }
        .top-nav b { font-size: 22px; flex-grow: 1; }

        /* 📸 Content Section */
        .report-content { padding: 25px 20px; display: flex; gap: 15px; position: relative; }
        .side-line { position: absolute; left: 35px; top: 75px; bottom: 40px; width: 2px; background: #efefef; z-index: 1; }
        
        .insta-logo { width: 32px; height: 32px; border: 1px solid #dbdbdb; border-radius: 8px; padding: 5px; background: #fff; z-index: 2; flex-shrink: 0; }
        
        .text-block { flex-grow: 1; display: flex; flex-direction: column; z-index: 2; }
        .date-text { font-size: 13px; color: var(--grey-text); margin-bottom: 6px; }
        .main-msg { font-size: 16px; font-weight: 500; color: #000; line-height: 1.4; margin-bottom: 12px; }
        .sub-msg { font-size: 14.5px; color: var(--grey-text); line-height: 1.4; margin-bottom: 25px; }
        
        .previous-msg { display: flex; align-items: center; gap: 12px; color: #3858f0; font-size: 15px; font-weight: 500; }
        .prev-dot { width: 14px; height: 14px; background: #dbdbdb; border-radius: 50%; }

        /* 🔘 Bottom Button */
        .btn-container { position: absolute; bottom: 30px; left: 20px; right: 20px; text-align: center; }
        .see-options { width: 100%; background: var(--insta-blue); color: #fff; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; }

        .footer-action { padding: 20px; background: #000; width: 100%; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 35px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color:var(--accent); margin-bottom:20px; font-family:monospace;">CEO REPORTS HUB</h2>
        <input type="password" id="pass" class="login-input" placeholder="Enter Password">
        <button onclick="unlock()" class="login-btn">Unlock Hub</button>
    </div>

    <div id="main-ui">
        <div id="capture-area">
            <div class="status-bar">
                <div class="sb-left">
                    <span class="editable" contenteditable="true">9:00</span>
                    <i class="fab fa-whatsapp"></i>
                    <i class="fab fa-facebook-messenger"></i>
                </div>
                <div class="sb-right">
                    <i class="fas fa-signal" style="font-size: 12px;"></i>
                    <span style="font-size: 12px; font-weight: 900;">4G</span>
                    <div class="bat-pill">
                        <div id="fill" class="bat-fill" style="width: 75%;"></div>
                        <span class="bat-text"><span id="perc" class="editable" contenteditable="true" oninput="updBat()">75</span>%</span>
                    </div>
                </div>
            </div>

            <div class="top-nav">
                <i class="fas fa-arrow-left"></i>
                <b>Reports</b>
            </div>

            <div class="report-content">
                <div class="side-line"></div>
                <div class="insta-logo">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/132px-Instagram_logo_2016.svg.png" style="width: 100%;">
                </div>
                <div class="text-block">
                    <div class="date-text editable" contenteditable="true">January 14</div>
                    <div class="main-msg editable" contenteditable="true">We removed choice__full_your_furniture's account from Instagram for not following our Community Standards</div>
                    <div class="sub-msg editable" contenteditable="true">Thanks for taking the time to report this. Reporting helps us keep Instagram a safe and supportive community.</div>
                    
                    <div class="previous-msg">
                        <div class="prev-dot"></div>
                        <span class="editable" contenteditable="true">1 Previous Message</span>
                    </div>
                </div>
            </div>

            <div class="btn-container">
                <button class="see-options editable" contenteditable="true">See options</button>
            </div>
        </div>

        <div class="footer-action">
            <button class="save-btn" onclick="save()">📸 SAVE REPORT SCREENSHOT</button>
        </div>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('pass').value === "asif2008") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
            } else { alert("ACCESS DENIED!"); }
        }

        function updBat() {
            let val = parseInt(document.getElementById('perc').innerText);
            if(!isNaN(val)) {
                document.getElementById('fill').style.width = val + '%';
                document.getElementById('fill').style.background = val < 20 ? '#ff3b30' : '#34c759';
            }
        }

        function save() {
            const el = document.getElementById('capture-area');
            html2canvas(el, { scale: 3, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Insta-Report-Proof.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
