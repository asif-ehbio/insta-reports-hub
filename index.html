<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Insta Reports Hub v1.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --insta-blue: #3858f0; --grey-text: #737373; --line-color: #dbdbdb; }
        body, html { margin: 0; padding: 0; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; height: 100%; width: 100%; overflow-x: hidden; }
        
        /* 🔒 CEO Access Hub Fix */
        #login-box { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 2000; position: fixed; top:0; left:0; }
        .login-input { padding: 15px; background: #111; border: 2px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; text-align: center; width: 75%; max-width: 300px; outline: none; }
        .login-btn { padding: 12px 40px; background: var(--accent); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #main-ui { display: none; width: 100%; flex-direction: column; background: #fff; min-height: 100vh; }
        #capture-area { background: #fff; width: 100%; position: relative; display: flex; flex-direction: column; }
        .editable { outline: none; border-bottom: 1px dashed transparent; }

        /* 🔋 Status Bar matched with 54625.png (01:22) */
        .status-bar { display: flex; justify-content: space-between; padding: 10px 18px 5px 18px; background: #fff; color: #000; font-size: 14px; font-weight: 700; align-items: center; }
        .sb-left { display: flex; align-items: center; gap: 8px; }
        .sb-right { display: flex; align-items: center; gap: 4px; }
