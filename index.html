<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Insta Reports Hub v1.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --insta-blue: #3858f0; --grey-text: #737373; --line-color: #dbdbdb; }
        body, html { margin: 0; padding: 0; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; height: 100%; width: 100%; overflow: hidden; }
        
        /* 🔒 CEO Access Hub */
        #login-box { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 2000; position: fixed; top:0; left:0; }
        .login-input { padding: 15px; background: #111; border: 2px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; text-align: center; width: 75%; max-width: 300px; outline: none; }
        .login-btn { padding: 12px 40px; background: var(--accent); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #main-ui { display: none; width: 100%; flex-direction: column; background: #fff; height: 100vh; }
        #capture-area { background: #fff; width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }
        .editable { outline: none; border-bottom: 1px dashed transparent; }
        .editable:focus { border-bottom: 1px dashed #ccc; }

        /* 🔋 iOS Status Bar matched with 54614.png (01:21) */
        .status-bar { display: flex; justify-content: space-between; padding: 10px 18px 5px 18px; background: #fff; color: #000; font-size: 14px; font-weight: 700; align-items: center; }
        .sb-left { display: flex; align-items: center; gap: 8px; font-size: 16px; }
        .sb-right { display: flex; align-items: center; gap: 4px; }
        .bat-pill { background: #e5e5ea; border-radius: 12px; padding: 2px 5px; display: flex; align-items: center; gap: 2px; position: relative; min-width: 40px; height: 18px; overflow: hidden; }
        .bat-fill { position: absolute; left: 0; top: 0; height: 100%; background: #34c759; transition: width 0.3s ease; z-index: 1; }
        .bat-text { position: relative; z-index: 2; color: #fff; font-size: 11px; font-weight: 800; }

        /* 🛠️ Top Nav Fixed */
        .top-nav { display: flex; align-items: center; padding: 12px 18px; gap: 28px; border-bottom: 1px solid #efefef; }
        .top-nav i { font-size: 18px; color: #000; }
        .top-nav b { font-size: 21.5px; flex-grow: 1; font-weight: 700; } /* Reports header weight */

        /* 📸 Exact Content Layout & Spacing */
        .report-section { padding: 22px 18px; display: flex; gap: 15px; position: relative; flex-grow: 1; }
        
        /* The Vertical Grey Line position and height matched */
        .v-line { position: absolute; left: 34.5px; top: 60px; height: 110px; width: 1.5px; background: var(--line-color); z-index: 1; }
        
        /* The exact square Instagram Glyph */
        .glyph-box { width: 33px; height: 33px; border: 1.5px solid var(--line-color); border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #fff; z-index: 2; flex-shrink: 0; margin-top: 5px; }
        /* Using inline SVG to guarantee exact glyph design */
        .glyph-icon { width: 18px; height: 18px; fill: #000; }

        .text-content { flex-grow: 1; display: flex; flex-direction: column; z-index: 2; padding-top: 3px; }
        
        /* Smaller date text weight */
        .date { font-size: 13.5px; color: var(--grey-text); margin-bottom: 4.5px; font-weight: 400; }
        
        /* Main body text font-weight adjusted */
        .bold-msg { font-size: 16px; font-weight: 600; color: #000; line-height: 1.4; margin-bottom: 13px; }
        
        /* Grey description text weight */
        .grey-msg { font-size: 14.5px; color: var(--grey-text); line-height: 1.4; margin-bottom: 30px; font-weight: 400; }
        
        /* 🛠️ Previous Message Section with bolder text */
        .prev-msg-row { display: flex; align-items: center; gap: 14px; color: var(--insta-blue); font-size: 15px; font-weight: 600; margin-top: 5px; }
        .grey-dot { width: 16px; height: 16px; background: var(--line-color); border-radius: 50%; flex-shrink: 0; }

        /* 🔘 "See Options" Button Layout Fix */
        /* The button now flows with the text rather than being fixed at bottom */
        .tight-button-area { margin-top: 15px; padding-bottom: 10px; }
        .blue-btn { width: 100%; background: var(--insta-blue); color: #fff; border: none; border-radius: 11px; padding: 14.5px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; }

        .footer-action { padding: 20px; background: #000; width: 100%; box-sizing: border-box; flex-shrink: 0; }
        .save-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 35px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color:var(--accent); margin-bottom:20px; font-family:monospace;">CEO REPORTS HUB</h2>
        <input type="password" id="pass" class="login-input" placeholder="Enter Password">
        <button onclick="unlock()" class="login-btn">Unlock Hub</button>
    </div>

    <div id="main-ui">
        <div id="capture-area">
            <div class="status-bar">
                <div class="sb-left">
                    <span class="editable" contenteditable="true">01:21</span> <i class="fab fa-whatsapp"></i>
                    <i class="fab fa-facebook-messenger"></i>
                </div>
