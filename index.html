<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Insta Reports Hub v1.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --insta-blue: #3858f0; --grey-text: #737373; --line-color: #dbdbdb; }
        
        /* 🛠️ Safe Layout */
        body, html { margin: 0; padding: 0; background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; height: 100%; width: 100%; overflow-x: hidden; }

        /* 🔒 CEO Login Overlay - Puranoy fix kora */
        #login-box { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; z-index: 10000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .login-input { padding: 15px; background: #111; border: 2px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; text-align: center; width: 75%; max-width: 300px; outline: none; }
        .login-btn { padding: 12px 40px; background: var(--accent); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: #000; }

        /* 📸 UI Layout */
        #main-ui { display: block; width: 100%; background: #fff; min-height: 100vh; visibility: hidden; }
        #capture-area { background: #fff; width: 100%; display: flex; flex-direction: column; }
        .editable { outline: none; border-bottom: 1px dashed transparent; }

        /* 🔋 Status Bar */
        .status-bar { display: flex; justify-content: space-between; padding: 10px 18px 5px 18px; color: #000; font-size: 14px; font-weight: 700; align-items: center; }
        .sb-left { display: flex; align-items: center; gap: 8px; }
        .sb-right { display: flex; align-items: center; gap: 4px; }
        .bat-pill { background: #e5e5ea; border-radius: 12px; padding: 2px 5px; display: flex; align-items: center; gap: 2px; position: relative; min-width: 40px; height: 18px; overflow: hidden; }
        .bat-fill { position: absolute; left: 0; top: 0; height: 100%; background: #34c759; z-index: 1; }
        .bat-text { position: relative; z-index: 2; color: #fff; font-size: 11px; font-weight: 800; }

        .top-nav { display: flex; align-items: center; padding: 12px 18px; gap: 28px; border-bottom: 1px solid #efefef; }
        .top-nav b { font-size: 21.5px; font-weight: 700; }

        .report-section { padding: 22px 18px; display: flex; gap: 15px; position: relative; }
        .v-line { position: absolute; left: 34.5px; top: 60px; height: 110px; width: 1.5px; background: var(--line-color); z-index: 1; }
        .glyph-box { width: 33px; height: 33px; border: 1.5px solid var(--line-color); border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #fff; z-index: 2; flex-shrink: 0; margin-top: 5px; }
        
        .text-content { flex-grow: 1; display: flex; flex-direction: column; z-index: 2; padding-top: 3px; }
        .date { font-size: 13.5px; color: var(--grey-text); margin-bottom: 4.5px; }
        .bold-msg { font-size: 16px; font-weight: 600; color: #000; line-height: 1.4; margin-bottom: 13px; }
        .grey-msg { font-size: 14.5px; color: var(--grey-text); line-height: 1.4; margin-bottom: 30px; }
        
        .prev-msg-row { display: flex; align-items: center; gap: 14px; color: var(--insta-blue); font-size: 15px; font-weight: 600; margin-top: 5px; }
        .grey-dot { width: 16px; height: 16px; background: var(--line-color); border-radius: 50%; }

        .button-area { padding: 15px 18px 30px 18px; }
        .blue-btn { width: 100%; background: var(--insta-blue); color: #fff; border: none; border-radius: 11px; padding: 14.5px; font-size: 16px; font-weight: 600; cursor: pointer; }

        .footer-action { padding: 20px; background: #000; width: 100%; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 35px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color:var(--accent); margin-bottom:20px; font-family:monospace;">CEO REPORTS HUB</h2>
        <input type="password" id="pass" class="login-input" placeholder="Enter Password" onkeypress="if(event.key === 'Enter') unlock()">
        <button onclick="unlock()" class="login-btn">Unlock Hub</button>
    </div>

    <div id="main-ui">
        <div id="capture-area">
            <div class="status-bar">
                <div class="sb-left">
                    <span class="editable" contenteditable="true">01:22</span>
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div class="sb-right">
                    <i class="fas fa-signal" style="font-size: 12px;"></i>
                    <span style="font-size: 12px; font-weight: 900;">4G</span>
                    <div class="bat-pill">
                        <div id="fill" class="bat-fill" style="width: 67%;"></div>
                        <span class="bat-text"><span id="perc" class="editable" contenteditable="true" oninput="updBat()">67</span>%</span>
                    </div>
                </div>
            </div>

            <div class="top-nav">
                <i class="fas fa-arrow-left"></i>
                <b class="editable" contenteditable="true">Reports</b>
            </div>

            <div class="report-section">
                <div class="v-line"></div>
                <div class="glyph-box"><i class="fab fa-instagram" style="font-size: 20px;"></i></div>
                <div class="text-content">
                    <div class="date editable" contenteditable="true">January 14</div>
                    <div class="bold-msg editable" contenteditable="true">We removed choice__full_your_furniture's account from Instagram for not following our Community Standards</div>
                    <div class="grey-msg editable" contenteditable="true">Thanks for taking the time to report this. Reporting helps us keep Instagram a safe and supportive community.</div>
                    <div class="prev-msg-row">
                        <div class="grey-dot"></div>
                        <span class="editable" contenteditable="true">1 Previous Message</span>
                    </div>
                </div>
            </div>

            <div class="button-area">
                <button class="blue-btn editable" contenteditable="true">See options</button>
            </div>
        </div>

        <div class="footer-action">
            <button class="save-btn" onclick="save()">📸 SAVE REPORT SCREENSHOT (v1.5)</button>
        </div>
    </div>

    <script>
        function unlock() {
            var inputPass = document.getElementById('pass').value;
            if(inputPass === "asif2008") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-ui').style.visibility = 'visible';
                console.log("Unlocked successfully!");
            } else { 
                alert("ACCESS DENIED!"); 
            }
        }

        function updBat() {
            let val = parseInt(document.getElementById('perc').innerText);
            if(!isNaN(val)) {
                document.getElementById('fill').style.width = val + '%';
            }
        }

        function save() {
            const el = document.getElementById('capture-area');
            html2canvas(el, { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Insta-Report-Fixed.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
